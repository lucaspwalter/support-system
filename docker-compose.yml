version: '3.8'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: support
      POSTGRES_PASSWORD: support
      POSTGRES_DB: support
    ports:
      - "5435:5432"

  backend:
    build: ./backend
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/support
      DATABASE_USER: support
      DATABASE_PASSWORD: support
    ports:
      - "8080:8080"
    depends_on:
      - db
